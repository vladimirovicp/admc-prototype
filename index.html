<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Таблица с иконками</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 24px; background: #f7f8fb; }
    .table-card { background: white; border-radius: 12px; box-shadow: 0 6px 20px rgba(16,24,40,0.08); padding: 18px; max-width: 900px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; padding: 10px 12px; font-weight: 600; font-size: 14px; border-bottom: 2px solid #eef1f6; }
    tbody td { padding: 10px 12px; border-bottom: 1px solid #f1f4f8; font-size: 14px; vertical-align: middle; }
    tbody > tr {background-color: #e1e1e1;}
    tbody > tr:nth-of-type(even) {background-color: rgb(237 238 242);}
    tbody tr:hover td { background: #fbfdff; }
    .muted { color: #6b7280; font-size: 13px; }
    .center { text-align: center; width: 80px; }
    img.icon-16 { width:16px; height:16px; }
    img.icon-24 { width:24px; height:24px; }
  </style>
</head>
<body>

  <div class="table-card">
    <h2>Таблица с иконками SVG</h2>
    <div id="table-container"></div>
  </div>

  <script>
    const path16 = "img/main/v1/16/";
    const path24 = "img/main/v1/24/";

    // Теперь можно задавать "title" для отображения в таблице
    const data = [
      { title: "OBJECT_CATEGORY_DOMAIN_DNS", nameImg: "object-category-domain-dns", desc: "Представляет домен DNS в Active Directory. Это корневой объект домена, который содержит все остальные объекты домена. Служит корневым контейнером для всех объектов домена." },
      { title: "OBJECT_CATEGORY_CONTAINER", nameImg: "object-category-container", desc: "Базовый контейнерный объект в Active Directory. Используется для группировки других объектов без специфической функциональности.Основной тип контейнера для иерархии организации." },
      { title: "OBJECT_CATEGORY_OU", nameImg: "object-category-ou", desc: "Organizational-Unit. Организационная единица (OU) - специальный тип контейнера для логической организации объектов домена по отделам, географическим расположениям или другим критериям. Используется для групповых политик и делегирования управления." },
      { title: "OBJECT_CATEGORY_GROUP", nameImg: "object-category-group", desc: "Группа безопасности или группа рассылки в Active Directory. Используется для управления правами доступа и рассылкой сообщений. Используется для управления правами." },
      { title: "", nameImg: "object-category-person-create", desc: "" },
      { title: "OBJECT_CATEGORY_PERSON", nameImg: "object-category-person", desc: "Базовый класс для объектов, представляющих людей (пользователи, контакты). Является родительским классом для user и contact. Базовый тип для всех объектов, представляющих людей." },
      { title: "", nameImg: "object-category-person-create", desc: "" },
      { title: "OBJECT_CATEGORY_COMPUTER", nameImg: "object-category-computer", desc: "Объект компьютера в домене. Представляет компьютеры, присоединенные к домену Active Directory. Используется для управления компьютерами домена." },
      { title: "OBJECT_CATEGORY_GP_CONTAINER", nameImg: "object-category-gp-container", desc: "Контейнер групповой политики (GPO). Содержит объекты групповых политик, которые применяются к пользователям и компьютерам. Используется для управления групповыми политиками." },


      { title: "OBJECT_CATEGORY_VOLUME", nameImg: "object-category-volume", desc: "Объект томов/общих папок. Представляет сетевые ресурсы и общие папки в Active Directory. Используется для управления сетевыми ресурсами." },
      { title: "OBJECT_CATEGORY_SERVERS_CONTAINER", nameImg: "object-category-servers-container", desc: "Системный контейнер серверов. Содержит объекты серверов домена и контроллеров домена. Содержит информацию о серверах домена." },
      { title: "OBJECT_CATEGORY_SITE", nameImg: "object-category-site", desc: "Объект сайта Active Directory. Представляет физическое расположение с контроллерами домена в одной подсети. Используется для управления топологией репликации." },
      { title: "", nameImg: "object-category-site-2", desc: "" },
      { title: "ADMC_CATEGORY_QUERY_ITEM", nameImg: "admc-category-query-item", desc: "Представляет отдельный элемент запроса в консоли ADMC. Используется для отображения результатов поиска или сохраненных запросов к Active Directory. Используется в QueryItemImpl для представления результатов запросов. Представляет папку с запросами в консоли ADMC. Содержит сохраненные запросы и позволяет организовывать их в иерархическую структуру. Используется в QueryFolderImpl для группировки запросов" },
      { title: "", nameImg: "", desc: "" },
      { title: "", nameImg: "", desc: "" },


      { title: "", nameImg: "", desc: "" },
      { title: "", nameImg: "", desc: "" },
      { title: "", nameImg: "", desc: "" },
      { title: "", nameImg: "", desc: "" },
      { title: "", nameImg: "", desc: "" },
      { title: "", nameImg: "", desc: "" },
      { title: "", nameImg: "", desc: "" },



      { title: "", nameImg: "", desc: "" },
      { title: "", nameImg: "", desc: "" },
      { title: "", nameImg: "", desc: "" },
      { title: "", nameImg: "", desc: "" },
      { title: "", nameImg: "", desc: "" },
      { title: "", nameImg: "", desc: "" },
      { title: "", nameImg: "", desc: "" },


    ];

    function createTable(dataArray, containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;

      const table = document.createElement('table');

      // Заголовки
      const thead = document.createElement('thead');
      const headerRow = document.createElement('tr');
      ['Название', '16', '24', 'Описание'].forEach((text, i) => {
        const th = document.createElement('th');
        th.textContent = text;
        if (i === 1 || i === 2) th.classList.add('center');
        headerRow.appendChild(th);
      });
      thead.appendChild(headerRow);
      table.appendChild(thead);

      // Тело
      const tbody = document.createElement('tbody');
      dataArray.forEach(item => {
        const tr = document.createElement('tr');

        // Название (title)
        const tdTitle = document.createElement('td');
        tdTitle.textContent = item.title ?? item.nameImg;
        tr.appendChild(tdTitle);

        // Иконка 16px
        const td16 = document.createElement('td');
        td16.classList.add('center');
        const img16 = document.createElement('img');
        img16.src = path16 + item.nameImg + ".svg";
        img16.alt = item.nameImg + " 16px";
        img16.className = "icon-16";
        td16.appendChild(img16);
        tr.appendChild(td16);

        // Иконка 24px
        const td24 = document.createElement('td');
        td24.classList.add('center');
        const img24 = document.createElement('img');
        img24.src = path24 + item.nameImg + ".svg";
        img24.alt = item.nameImg + " 24px";
        img24.className = "icon-24";
        td24.appendChild(img24);
        tr.appendChild(td24);

        // Описание
        const tdDesc = document.createElement('td');
        tdDesc.textContent = item.desc ?? '';
        tdDesc.classList.add('muted');
        tr.appendChild(tdDesc);

        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      container.innerHTML = '';
      container.appendChild(table);
    }

    createTable(data, 'table-container');
  </script>
</body>
</html>
